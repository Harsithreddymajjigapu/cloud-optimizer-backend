name: Cloud Optimizer CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: cloud_optimizer_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest tests
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/cloud_optimizer_db
          REDIS_URL: redis://localhost:6379/0
          GEMINI_API_KEY: test_key
          SECRET_KEY: test_secret_key_123
        run: |
          python -m pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t cloud-optimizer-backend .

      - name: Verify image built
        run: |
          docker images | grep cloud-optimizer-backend